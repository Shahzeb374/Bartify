<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bartify - Sign Up</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="signup.css"/>
</head>
<body>

  <!-- Logo -->
  <a class="logo" href="index.html">
    <div class="logo-icon">⇄</div>
    <span class="logo-text">Bartify</span>
  </a>

  <!-- Title -->
  <h1 class="page-title">Create your account</h1>
  <p class="page-subtitle">Start exchanging with the community</p>

  <!-- Card -->
  <div class="signup-card">
    <form id="signupForm" onsubmit="return false;">
      <!-- Full Name -->
      <div class="mb-3">
        <label class="form-label">Full Name</label>
        <input type="text" id="fullName" class="form-control" placeholder="Full Name"/>
        <div class="error-text" id="fullNameError"></div>
      </div>

      <!-- Email -->
      <div class="mb-3">
        <label class="form-label">Email</label>
        <input type="text" id="email" class="form-control" placeholder="Enter Your Email"/>
        <div class="error-text" id="emailError"></div>
      </div>

      <!-- Contact -->
      <div class="mb-3">
        <label class="form-label">Contact Number <span class="label-optional">(Optional)</span></label>
        <input type="text" id="contact" class="form-control" placeholder="+923-00-1234567"/>
      </div>

      <!-- Password -->
      <div class="mb-3">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="••••••••"/>
        <div class="hint-text">Must be at least 8 characters, include uppercase, number & special character</div>
        <div class="error-text" id="passwordError"></div>
      </div>

      <!-- Confirm Password -->
      <div class="mb-3">
        <label class="form-label">Confirm Password</label>
        <input type="password" id="confirmPassword" class="form-control" placeholder="••••••••"/>
        <div class="error-text" id="confirmPasswordError"></div>
      </div>

      <!-- Profile Picture -->
      <div class="mb-2">
        <label class="form-label">Profile Picture <span class="label-optional">(Optional)</span></label>
        <div class="upload-wrap">
          <div class="upload-icon-btn" id="previewWrap">
            <!-- existing svg -->
          </div>
          <button class="btn-upload-photo" type="button" onclick="document.getElementById('photoInput').click()">Upload Photo</button>
          <input type="file" id="photoInput" accept="image/*" style="display:none"/>
        </div>
        <div class="error-text" id="photoError"></div>
      </div>

      <button type="button" class="btn-create" onclick="validateForm(event)">Create Account</button>
    </form>
  </div>

  <!-- Bottom -->
  <p class="bottom-text">Already have an account? <a href="login.html">Sign in</a></p>

  <script src="signup.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
