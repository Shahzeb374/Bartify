<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bartify – Trade What You Have</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet"/>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- ══════════ NAVBAR ══════════ -->
<nav class="navbar" style="position:relative;">
  <div class="container">
    <a class="navbar-brand" href="index.html">
      <div class="brand-icon">⇄</div>
      <span class="brand-name">Bartify</span>
    </a>

    <div class="search-wrap">
      <input type="text" id="searchInput" placeholder="Search products…" oninput="doSearch()"/>
      <button class="search-icon-btn" onclick="doSearch()"><i class="bi bi-search"></i></button>
    </div>

    <div class="nav-right">
      <button class="mobile-search-btn" onclick="toggleMobileSearch()" title="Search">
        <i class="bi bi-search"></i>
      </button>

      <!-- Logged OUT -->
      <div class="d-flex align-items-center gap-2" id="navLoggedOut">
        <a href="login.html" class="btn-login">Login</a>
        <a href="Signup.html" class="btn-signup">Sign Up</a>
      </div>

      <!-- Logged IN -->
      <div class="d-flex align-items-center gap-2" id="navLoggedIn" style="display:none!important;">
        <a href="#" class="nav-icon-btn" title="Favorites"><i class="bi bi-heart"></i></a>
        <a href="list-item.html" class="btn-list-item">List Item</a>
        <div id="" class="nav-avatar-wrap" onclick="toggleDropdown()">
          <img id="navProfilePic" src="" alt="Profile" class="nav-avatar-img" style="display:none"/>
          <div id="navAvatar" class="nav-avatar-text"></div>
          <div class="nav-dropdown" id="navDropdown">
            <div class="dropdown-user-info">
              <div class="dropdown-user-icon"><i class="bi bi-person-fill"></i></div>
              <div>
                <div class="d-uname" id="dropdownName">User</div>
                <div class="d-uemail" id="dropdownEmail">email@example.com</div>
              </div>
            </div>
            <a href="dashboard.html"><i class="bi bi-grid-1x2-fill"></i> Dashboard</a>
            <div class="dd-divider"></div>
            <a href="#" class="logout-link" onclick="logoutUser();return false;">
              <i class="bi bi-box-arrow-right"></i> Logout
            </a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div class="mobile-search-bar" id="mobileSearchBar">
    <input type="text" id="mobileSearchInput" placeholder="Search products…" oninput="doMobileSearch()"/>
    <button onclick="doMobileSearch()">Search</button>
  </div>
</nav>

<!-- ══════════ HERO ══════════ -->
<section class="hero">
  <div class="container">
    <h1 class="hero-title">Trade What You Have for<br/>What You Need</h1>
    <p class="hero-subtitle">Join thousands exchanging quality used products in a sustainable marketplace.</p>
    <a href="login.html" class="btn-get-started" id="heroBtn">Get Started</a>
  </div>
</section>

<!-- ══════════ CATEGORIES ══════════ -->
<section class="categories">
  <div class="container">
    <div class="cat-filters">
      <button class="cat-btn active" data-cat="All"         onclick="filterCat(this)">All</button>
      <button class="cat-btn"        data-cat="Electronics" onclick="filterCat(this)">Electronics</button>
      <button class="cat-btn"        data-cat="Furniture"   onclick="filterCat(this)">Furniture</button>
      <button class="cat-btn"        data-cat="Sports"      onclick="filterCat(this)">Sports</button>
      <button class="cat-btn"        data-cat="Home"        onclick="filterCat(this)">Home</button>
      <button class="cat-btn"        data-cat="Music"       onclick="filterCat(this)">Music</button>
      <button class="cat-btn"        data-cat="Books"       onclick="filterCat(this)">Books</button>
    </div>
  </div>
</section>

<!-- ══════════ PRODUCTS ══════════ -->
<section class="products-section">
  <div class="container">
    <div class="products-header">
      <div>
        <h2 class="products-title" id="productsHeading">All Listings</h2>
        <p class="products-sub">Browse items available for trade right now.</p>
      </div>
    </div>
    <div class="products-grid" id="productsGrid"></div>
  </div>
</section>

<!-- ══════════ PRODUCT DETAIL MODAL ══════════ -->
<div class="pd-overlay" id="pdOverlay" onclick="overlayClick(event)">
  <div class="pd-modal" id="pdModal">
    <button class="pd-close" onclick="closeDetail()"><i class="bi bi-x-lg"></i></button>
    <button class="pd-back" onclick="closeDetail()">
      <i class="bi bi-arrow-left"></i> Back to products
    </button>
    <div class="pd-body" id="pdBody"></div>
  </div>
</div>

<!-- ══════════ TOAST ══════════ -->
<div class="toast-wrap" id="toastWrap"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="script.js">
</script>
</body>
</html>
