<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Bartify - Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link rel="stylesheet" href="login.css" />
</head>
<body>

  <!-- Logo -->
  <a class="logo" href="index.html">
    <div class="logo-icon">⇄</div>
    <span class="logo-text">Bartify</span>
  </a>

  <!-- Title -->
  <h1 class="page-title">Welcome back</h1>
  <p class="page-subtitle">Sign in to continue trading</p>

  <!-- Card -->
  <div class="login-card">
    <div class="mb-4">
      <label class="form-label">Email</label>
      <input type="text" id="email" class="form-control" placeholder="Enter Your Email"/>
      <div class="error-text" id="emailError"></div>
    </div>
    <div class="mb-2">
      <label class="form-label">Password</label>
      <input type="password" id="password" class="form-control" placeholder="Enter Your Password"/>
      <div class="error-text" id="passwordError"></div>
      <a href="forgetpassword.html" class="forgot-link">Forgot password?</a>
    </div>
    <button class="btn-signin" onclick="validateLogin()">Sign In</button>
  </div>

  <!-- Bottom -->
  <p class="bottom-text">Don't have an account? <a href="Signup.html">Sign up</a></p>

  <script src="login.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
